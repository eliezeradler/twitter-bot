name: RSS to Google Chat Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # חובה כדי לאפשר לבוט לעדכן את הקבצים במאגר

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser beautifulsoup4 google-auth google-auth-oauthlib google-auth-httplib2

      - name: Run bot.py
        env:
          CHAT_SPACE: ${{ secrets.CHAT_SPACE }}
          RSS_URL: ${{ secrets.RSS_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python bot.py

      - name: Commit state
        run: |
          git config --global user.name 'bot'
          git config --global user.email 'bot@bot.com'
          git add last_ids.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update last_ids.json" && git push)
        continue-on-error: true
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Update bot state"
          git push
